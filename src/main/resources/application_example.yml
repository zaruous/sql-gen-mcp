server:
  port: 8081

mcp:
  port: 7070

# RAG & Vector Store 설정
ai:
  vector-store:
    # 임베딩 모델 제공자: local (기본, 내장), ollama, vllm, gemini
    provider: local

    # 벡터 저장소 백엔드: inmemory (기본, 재시작 시 초기화), chroma (ChromaDB, 영구 저장)
    backend: inmemory

    providers:
      ollama:
        base-url: "http://localhost:11434"
        model-name: "nomic-embed-text"
      vllm:
        base-url: "http://localhost:8000/v1"
        model-name: "your-vllm-model"
        api-key: "optional"
      gemini:
        api-key: "your-gemini-api-key"
        model-name: "text-embedding-004"

    # ChromaDB 백엔드 설정 (backend: chroma 일 때 사용)
    backends:
      chroma:
        host: "http://localhost:8000"
        table-collection: "sql_gen_tables"      # 테이블 스키마 임베딩 컬렉션
        examples-collection: "sql_gen_examples" # SQL 예시 임베딩 컬렉션

# SQL 예시 저장 파일 경로 (기본: sql-examples.json)
sql:
  examples:
    path: "sql-examples.json"

db:
  driver: org.postgresql.Driver
  url: jdbc:postgresql://192.168.45.7:5433/dbmes
  user: tester1
  pw: tester1
  schema-output-dir: docs/schema

