server:
  port: 8081

mcp:
  port: 7070

# RAG & Vector Store 설정
ai:
  vector-store:
    # 벡터 저장 방식: local (기본, 인메모리), chroma (ChromaDB)
    provider: chroma

    providers:
      ollama:
        base-url: "http://localhost:11434"
        model-name: "nomic-embed-text"
      vllm:
        base-url: "http://localhost:8000/v1"
        model-name: "your-vllm-model"
        api-key: "optional"

    # ChromaDB 설정 (provider: chroma 일 때 사용)
    # Docker 예: docker run -p 18000:8000 chromadb/chroma
    # ChromaDB 0.6.0+ 는 /api/v2/tenants/{tenant}/databases/{database}/collections 사용
    chroma:
      url: "http://host.docker.internal:18000"
      collection-name: "sql-mcp-tools"
      table-collection-name: "sql-mcp-tools"        # 테이블 스키마 임베딩 컬렉션
      example-collection-name: "sql-mcp-examples"  # SQL 예시 임베딩 컬렉션
      tenant: "sql_mcp_server"
      database: "sql_mcp_server"

# SQL 예시 저장 파일 경로 (기본: sql-examples.json)
sql:
  examples:
    path: "sql-examples.json"

db:
  driver: org.postgresql.Driver
  url: jdbc:postgresql://192.168.45.7:5433/dbmes
  user: tester1
  pw: tester1
  schema-output-dir: docs/schema

# Examples for other DBMS
