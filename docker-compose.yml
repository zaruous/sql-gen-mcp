services:
  mcp-server:
    build: .
    ports:
      - "8081:8081"
      - "7070:7070"
    environment:
      # 외부 ChromaDB 연결 정보 (application.yml 값보다 우선 적용)
      - CHROMA_URL=http://your-chroma-host:8000
      - CHROMA_TENANT=default_tenant
      - CHROMA_DATABASE=default_database
    volumes:
      - sql-gen-mcp-schema:/app/docs/schema
      - sql-gen-mcp-data:/app/data
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: tester1
      POSTGRES_PASSWORD: tester1
    ports:
      - "5432:5432"
    volumes:
      - sql-gen-mcp-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tester1 -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sql-gen-mcp-schema:
  sql-gen-mcp-data:
  sql-gen-mcp-db:
